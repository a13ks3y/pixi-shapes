<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css">
    <title>PixiJS</title>
  <script type="module" crossorigin src="/assets/index-Bs67v7DC.js"></script>
</head>

<body>
    <div class="controls">
        <div>
            <div>Shapes on the page: <span id="shapes-count"></span></div>
            <div>Total area: <span id="shapes-area"></span>p^2</div>
        </div>
        <div>
            <label for="gravity">Gravity: <span id="gravity-text">9.8</span></label>
            <input id="gravity" type="range" value="9.8" max="16" min="0.1" step="0.1"/>
        </div>
        <div>
            <label for="generation-rate">Generation Rate: <span id="generation-rate-text">6</span> shapes per second</label>
            <input id="generation-rate" type="range" value="6" max="16" min="1"/>
        </div>
    </div>
    <main>
        <div id="app">
            <div id="pixi-container"></div>
        </div>
    </main>
    <footer>
        <button id="gravity-decrease" aria-label="Decrease gravity">-</button>
        <button id="gravity-increase" aria-label="Increase gravity">+</button>
        <button id="generation-rate-decrease" aria-label="Decrease generation rate">-</button>
        <button id="generation-rate-increase" aria-label="Increase generation rate">+</button>

    </footer>

</body>
</html>
