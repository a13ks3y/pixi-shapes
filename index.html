<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css">
    <title>PixiJS - Template</title>
</head>

<body>
    <div id="app">
        <div id="pixi-container"></div>
    </div>
    <div class="controls">
        <label for="gravity">Gravity: <span id="gravity-text">9.8</span></label>
        <input id="gravity" type="range" value="9.8" max="16" min="0.1" step="0.1"/>
        <br>
        <label for="generation-rate">Generation Rate: <span id="generation-rate-text">6</span> shapes per second</label>
        <input id="generation-rate" type="range" value="6" max="16" min="1"/>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
